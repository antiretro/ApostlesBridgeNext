name: Run Gradle Build
on:
  - push
  - pull_request

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.1.1

      - name: Setup Java 21
        uses: actions/setup-java@v4.0.0
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Execute Gradle build
        run: ./gradlew build

      - name: Collect and rename JARs
        run: |
          mkdir -p build/libs

          for file in versions/*/build/libs/*.jar; do
            [ -f "$file" ] || continue

            version=$(basename "$(dirname "$(dirname "$file")")")
            name=$(basename "$file" .jar)

            mv "$file" "build/libs/${name}-${version}.jar"
          done
          
      - name: Upload built mod JAR
        uses: actions/upload-artifact@v4.3.0
        with:
          name: mod-jar
          path: build/libs/*.jar
